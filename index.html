<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Date & Time - US Timezones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .date-display {
            color: #667eea;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .timezone-section {
            margin-top: 40px;
            border-top: 2px solid #f0f0f0;
            padding-top: 30px;
        }

        .timezone-section h2 {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .timezone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .timezone-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .timezone-name {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-time {
            color: white;
            font-size: 1.4rem;
            font-weight: 500;
            margin: 0;
            font-family: 'Courier New', monospace;
        }

        .timestamp {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Today's Date & Time</h1>
        <p class="date-display" id="date-display"></p>

        <div class="timezone-section">
            <h2>Current Time (US + International)</h2>
            <div class="timezone-grid" id="timezone-grid">
                <div class="timezone-card hidden" id="timezone-template">
                    <p class="timezone-name"></p>
                    <p class="timezone-time"></p>
                </div>
            </div>
        </div>

        <p class="timestamp" id="last-updated"></p>
    </div>

    <script>
        const timezones = [
            { name: 'Eastern', tz: 'America/New_York' },
            { name: 'Central', tz: 'America/Chicago' },
            { name: 'Mountain', tz: 'America/Denver' },
            { name: 'Pacific', tz: 'America/Los_Angeles' },
            { name: 'Alaska', tz: 'America/Anchorage' },
            { name: 'Hawaii', tz: 'Pacific/Honolulu' },
            { name: 'Greece', tz: 'Europe/Athens' },
            { name: 'China', tz: 'Asia/Shanghai' }
        ];

        const dateDisplay = document.getElementById('date-display');
        const timezoneGrid = document.getElementById('timezone-grid');
        const timezoneTemplate = document.getElementById('timezone-template');
        const lastUpdated = document.getElementById('last-updated');

        const timezoneCards = timezones.map((zone) => {
            const card = timezoneTemplate.cloneNode(true);
            card.id = '';
            card.classList.remove('hidden');
            card.querySelector('.timezone-name').textContent = zone.name;
            timezoneGrid.appendChild(card);
            return { zone, card };
        });

        timezoneTemplate.remove();

        function formatDate(now) {
            return now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatTime(now, timeZone) {
            return now.toLocaleTimeString('en-US', {
                timeZone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
        }

        function updateClock() {
            const now = new Date();
            dateDisplay.textContent = formatDate(now);

            timezoneCards.forEach(({ zone, card }) => {
                card.querySelector('.timezone-time').textContent = formatTime(now, zone.tz);
            });

            const easternLabel = now.toLocaleDateString('en-US', {
                timeZone: 'America/New_York',
                timeZoneName: 'short'
            }).split(', ').pop();

            lastUpdated.textContent = `Last updated: ${formatDate(now)} at ${formatTime(now, 'America/New_York')} ${easternLabel}`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
